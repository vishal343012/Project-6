name: Deploy Static Website to IIS

on:
push:
branches:
- main

jobs:
deploy:
runs-on: self-hosted

```
steps:

  - name: Checkout Repository
    uses: actions/checkout@v3

  - name: Stop IIS Website
    shell: powershell
    run: |
      Import-Module WebAdministration
      Stop-WebSite -Name "Default Web Site"

  - name: Copy Website Files
    shell: powershell
    run: |
      $source = "${{ github.workspace }}"
      $destination = "C:\inetpub\wwwroot"

      robocopy $source $destination /MIR /XD ".git" ".github"

      $rc = $LASTEXITCODE
      if ($rc -lt 8) {
          Write-Host "Robocopy completed successfully with exit code $rc"
          exit 0
      } else {
          Write-Host "Robocopy failed with exit code $rc"
          exit $rc
      }

  - name: Start IIS Website
    shell: powershell
    run: |
      Import-Module WebAdministration
      Start-WebSite -Name "Default Web Site"
```
